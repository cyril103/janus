name: Janus CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  toolchain:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            llvm_dir: /usr/lib/llvm-18/lib/cmake/llvm
            cc: /usr/lib/llvm-18/bin/clang
            cxx: /usr/lib/llvm-18/bin/clang++
          - name: macOS ARM64
            os: macos-14
            llvm_dir: /opt/homebrew/opt/llvm/lib/cmake/llvm
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++
          - name: Windows x86_64
            os: windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-18 lld-18 llvm-18-dev ninja-build
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm lld ninja
          echo "/opt/homebrew/opt/llvm/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/lld/bin" >> "$GITHUB_PATH"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-lld
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-llvm

      - name: Configure
        if: runner.os != 'Windows'
        shell: bash
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER="${{ matrix.cc }}"
          -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}"
          -DLLVM_DIR="${{ matrix.llvm_dir }}"

      - name: Configure on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=/ucrt64/bin/clang.exe
          -DCMAKE_CXX_COMPILER=/ucrt64/bin/clang++.exe
          -DLLVM_DIR=/ucrt64/lib/cmake/llvm

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        if: runner.os != 'Windows'
        run: >
          ctest --test-dir build --output-on-failure
          --stop-on-failure --timeout 60

      - name: Test on Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: >
          ctest --test-dir build --output-on-failure
          --stop-on-failure --timeout 60

      - name: Package
        run: cmake --build build --target dist

      - name: Smoke test packaged toolchain
        if: runner.os != 'Windows'
        shell: bash
        run: scripts/smoke-test-package.sh build/janus-*.tar.gz

      - name: Smoke test packaged toolchain on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: scripts/smoke-test-package.ps1 build/janus-*.zip

      - name: Upload distribution
        uses: actions/upload-artifact@v7
        with:
          name: janus-${{ runner.os }}-${{ runner.arch }}
          path: |
            build/janus-*.tar.gz
            build/janus-*.tar.gz.sha256
            build/janus-*.zip
            build/janus-*.zip.sha256
          if-no-files-found: error

  linux-compatibility:
    name: Linux package on ${{ matrix.name }}
    needs: toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            install: >-
              apt-get update &&
              apt-get install --yes build-essential ca-certificates
              coreutils findutils gzip tar
          - name: Fedora 42
            image: fedora:42
            install: >-
              dnf install --assumeyes gcc glibc-devel libstdc++-devel
              coreutils findutils gzip tar
          - name: openSUSE Tumbleweed
            image: opensuse/tumbleweed
            install: >-
              zypper --non-interactive install gcc glibc-devel
              libstdc++-devel coreutils findutils gzip tar
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install native SDK
        shell: bash
        run: ${{ matrix.install }}

      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Download Linux distribution
        uses: actions/download-artifact@v8
        with:
          name: janus-Linux-X64
          path: dist

      - name: Exercise installed toolchain
        shell: bash
        run: scripts/smoke-test-package.sh dist/janus-*.tar.gz

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [toolchain, linux-compatibility]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Verify release version
        run: >
          cmake -DTAG="${GITHUB_REF_NAME}"
          -DSOURCE_DIR="${GITHUB_WORKSPACE}"
          -P cmake/verify_release_version.cmake

      - name: Download distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/artifacts dist/release
          gh run download "$GITHUB_RUN_ID" --dir dist/artifacts
          find dist/artifacts -type f -exec cp '{}' dist/release/ ';'

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/release/*.tar.gz
            dist/release/*.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          options=(--verify-tag --generate-notes)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            options+=(--prerelease --latest=false)
          else
            options+=(--latest)
          fi
          gh release create "$GITHUB_REF_NAME" dist/release/* "${options[@]}"

      - name: Update release channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          channel=stable
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then channel=beta; fi
          cmake -DSOURCE_DIR="$GITHUB_WORKSPACE" \
            -DRELEASE="$GITHUB_REF_NAME" \
            -DOUTPUT="$RUNNER_TEMP/version" \
            -P cmake/write_channel_manifest.cmake
          if gh release view "channel-$channel" >/dev/null 2>&1; then
            gh release upload "channel-$channel" "$RUNNER_TEMP/version" --clobber
          else
            gh release create "channel-$channel" "$RUNNER_TEMP/version" \
              --title "Janus $channel channel" --prerelease
          fi

  nightly:
    name: Publish nightly channel
    if: github.event_name == 'schedule'
    needs: [toolchain, linux-compatibility]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Download distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/artifacts dist/release
          gh run download "$GITHUB_RUN_ID" --dir dist/artifacts
          find dist/artifacts -type f -exec cp '{}' dist/release/ ';'

      - name: Attest nightly provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/release/*.tar.gz
            dist/release/*.zip

      - name: Publish nightly toolchain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view nightly >/dev/null 2>&1; then
            gh release upload nightly dist/release/* --clobber
          else
            gh release create nightly dist/release/* \
              --title "Janus nightly" --prerelease
          fi
          cmake -DSOURCE_DIR="$GITHUB_WORKSPACE" \
            -DRELEASE=nightly \
            -DOUTPUT="$RUNNER_TEMP/version" \
            -P cmake/write_channel_manifest.cmake
          if gh release view channel-nightly >/dev/null 2>&1; then
            gh release upload channel-nightly "$RUNNER_TEMP/version" --clobber
          else
            gh release create channel-nightly "$RUNNER_TEMP/version" \
              --title "Janus nightly channel" --prerelease
          fi
