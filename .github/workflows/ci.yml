name: Janus CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  toolchain:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            llvm_dir: /usr/lib/llvm-18/lib/cmake/llvm
          - name: macOS arm64
            os: macos-15
            llvm_dir: /opt/homebrew/opt/llvm/lib/cmake/llvm
          - name: Windows x86_64
            os: windows-2025
            llvm_dir: C:/Program Files/LLVM/lib/cmake/llvm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-18 lld-18 llvm-18-dev ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install llvm ninja --yes --no-progress

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DLLVM_DIR="${{ matrix.llvm_dir }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cmake --build build --target dist

      - name: Upload distribution
        uses: actions/upload-artifact@v7
        with:
          name: janus-${{ runner.os }}-${{ runner.arch }}
          path: |
            build/janus-*.tar.gz
            build/janus-*.tar.gz.sha256
            build/janus-*.zip
            build/janus-*.zip.sha256
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: toolchain
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Check out Janus
        uses: actions/checkout@v6

      - name: Verify release version
        run: >
          cmake -DTAG="${GITHUB_REF_NAME}"
          -DSOURCE_DIR="${GITHUB_WORKSPACE}"
          -P cmake/verify_release_version.cmake

      - name: Download distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/artifacts dist/release
          gh run download "$GITHUB_RUN_ID" --dir dist/artifacts
          find dist/artifacts -type f -exec cp '{}' dist/release/ ';'

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/release/*.tar.gz
            dist/release/*.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/release/*
          --verify-tag
          --generate-notes
